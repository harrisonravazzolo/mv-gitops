# Stay organized by always using a categorized template when creating an issue.
blank_issues_enabled: false

# Set up custom issue templates.
# > (Why not use issue templates for this?  They don't support the "milestone" parameter.  This is the next best option when/if you want to automatically attach a milestone.)
# > Supported syntax for contact_links: https://docs.github.com/en/github/building-a-strong-community/configuring-issue-templates-for-your-repository#configuring-the-template-chooser
# > Querystring parameter cheat sheet: https://docs.github.com/en/github/managing-your-work-on-github/about-automation-for-issues-and-pull-requests-with-query-parameters
